<!-- Hero Section -->
<section id="hero" class="min-h-screen flex flex-col justify-center px-8 max-w-7xl mx-auto pt-32">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-12 items-center">
        <div class="lg:col-span-7 space-y-6 lg:space-y-8">
            <div class="flex items-center space-x-3">
                <span class="w-2 h-2 lg:w-3 lg:h-3 rounded-full bg-primary animate-pulse"></span>
                <span class="mono-label text-primary text-[0.7rem] lg:text-sm tracking-widest uppercase">● SYSTEM_ACTIVE</span>
            </div>
            
            <h1 class="text-4xl sm:text-5xl md:text-6xl lg:text-8xl font-bold tracking-tighter leading-tight lg:leading-none text-on-surface">
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-tertiary">SOFTWARE </span>
                <span class="block sm:inline">ENGINEER.</span>
            </h1>
            
            <p class="text-base sm:text-lg md:text-xl text-on-surface-variant max-w-2xl leading-relaxed">
                Enjoy transforming ideas into functional applications and always seek to expand my knowledge to deliver modern, efficient, and scalable solutions.
            </p>
            
            <!-- Mobile-friendly button container -->
            <div class="flex flex-col sm:flex-row sm:items-center gap-4 sm:gap-6 pt-4">
                <button class="signature-gradient text-on-primary px-6 sm:px-8 py-3 sm:py-4 rounded-md font-bold text-base sm:text-lg hover:brightness-110 transition-all w-full sm:w-auto" onclick="initializeProject()">
                    Initialize Project
                </button>
                
                <div class="flex flex-wrap gap-4 sm:gap-6">
                    <a class="text-primary mono-label text-xs sm:text-sm hover:underline decoration-2 underline-offset-8 transition-all cursor-pointer" onclick="scrollToSection('projects')">
                        _View_Projects
                    </a>
                    <a class="text-primary mono-label text-xs sm:text-sm hover:underline decoration-2 underline-offset-8 transition-all cursor-pointer" href="https://drive.google.com/file/d/1ZEu4qnduKk6VBfgbyiKB27UPi69Ni2_I/view?usp=sharing">
                        _Download_CV
                    </a>
                </div>
            </div>
        </div>
        
        <div class="hidden lg:block lg:col-span-5">
            <div class="relative w-full aspect-square rounded-xl overflow-hidden ghost-border bg-surface-container-low p-2">
                <img alt="Server Infrastructure" class="w-full h-full object-cover rounded-lg opacity-95 mix-blend-screen hero-image" src="./assets/images/server-rack.jpeg"/>
                <div class="absolute inset-0 bg-gradient-to-t from-surface via-transparent to-transparent"></div>
                <div class="absolute bottom-4 left-4 mono-label text-[10px] text-primary/50 uppercase tracking-[0.3em]">
                    UID: 882-MONEM-ADAWY
                </div>
            </div>
        </div>
    </div>
</section>
