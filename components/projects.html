<!-- Modal - Improved for mobile -->
<div id="image-modal" class="fixed inset-0 bg-black/90 hidden items-center justify-center z-50" onclick="if(event.target === this) closeModal()">
    <div class="relative w-full max-w-4xl px-4 sm:px-6">
        
        <!-- Close button - larger touch target on mobile -->
        <button onclick="closeModal()" 
            class="absolute -top-8 sm:top-2 right-2 text-white text-xl sm:text-2xl z-50 w-8 h-8 sm:w-auto sm:h-auto flex items-center justify-center bg-black/50 rounded-full sm:bg-transparent"
            aria-label="Close modal">
            ✕
        </button>

        <!-- Image container -->
        <div class="relative flex items-center justify-center">
            <img id="modal-image" class="w-full max-h-[60vh] sm:max-h-[80vh] object-contain rounded-lg" />
            
            <!-- Navigation arrows - larger on mobile -->
            <button onclick="prevImage()" 
                class="absolute left-0 sm:-left-8 top-1/2 -translate-y-1/2 text-white text-2xl sm:text-3xl px-3 sm:px-4 py-2 bg-black/50 rounded-full sm:bg-transparent"
                aria-label="Previous image">
                ‹
            </button>

            <button onclick="nextImage()" 
                class="absolute right-0 sm:-right-8 top-1/2 -translate-y-1/2 text-white text-2xl sm:text-3xl px-3 sm:px-4 py-2 bg-black/50 rounded-full sm:bg-transparent"
                aria-label="Next image">
                ›
            </button>
        </div>

        <!-- Dots indicator -->
        <div id="modal-dots" class="flex justify-center mt-4 gap-2 sm:gap-3"></div>
        
        <!-- Image counter for mobile -->
        <div id="image-counter" class="text-center mt-2 text-white/60 text-xs sm:hidden"></div>
    </div>
</div>
